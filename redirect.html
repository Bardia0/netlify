<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
        // Immediate redirect with no delay
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            let targetUrl = urlParams.get('u');
            
            if (targetUrl) {
                targetUrl = decodeURIComponent(targetUrl);
                
                // Only allow 127.0.0.1 or localhost
//                if (targetUrl.includes('127.0.0.1') || targetUrl.includes('localhost')) {
//                    if (!targetUrl.startsWith('http://') && !targetUrl.startsWith('https://')) {
                        targetUrl = 'http://' + targetUrl;
//                    }
                    window.location.href = targetUrl;
 //               } else {
 //                   document.body.innerHTML = '<h1 style="color:red;">Error: Only redirects to 127.0.0.1 or localhost are allowed</h1>';
  //              }
            } else {
                document.body.innerHTML = '<h1 style="color:red;">Error: Missing "u" parameter</h1><p>Usage: ?u=http://127.0.0.1:3000</p>';
            }
        })();
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
